<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Параллакс пример</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
  }

  /* Параллакс фон */
  .parallax {
    position: relative;
    height: 500px;
    background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e'); /* пример фона */
    background-size: cover;
    background-position: center;
  }

  /* Контент сверху */
  .content {
    height: 500px;
    background-color: rgba(255,255,255,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 50px;
  }

  h1 {
    margin: 0 0 20px 0;
    font-size: 3em;
  }

  p {
    font-size: 1.2em;
  }
</style>
</head>
<body>

<div class="parallax" id="parallax"></div>

<div class="content">
  <h1>TEXT</h1>
  <p>TEXTTEXTTEXTTEXT</p>
</div>

<div class="parallax" id="parallax2"></div>

<div class="content">
  <h1>TEXT</h1>
  <p>TEXTTEXTTEXTTEXT</p>
</div>

<script>
  // JS параллакс
  const parallax1 = document.getElementById('parallax');
  const parallax2 = document.getElementById('parallax2');

  window.addEventListener('scroll', () => {
    let offset = window.pageYOffset;
    parallax1.style.backgroundPositionY = offset * 0.3 + 'px';
    parallax2.style.backgroundPositionY = offset * 0.5 + 'px';
  });
</script>

</body>
</html>
